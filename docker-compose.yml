version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - viralflux

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    env_file: .env
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - viralflux

  # ── Shared v2 environment ──────────────────────────────────────────────────
  # backend, worker and beat run the SAME image and need the SAME env. The full
  # set is loaded from .env via `env_file`; the `environment` block below is an
  # explicit, self-documenting view of the v2 stack (Gemini-only LLM, ElevenLabs
  # TTS, Imagen images, direct YouTube OAuth, credits). It is kept in YAML anchor
  # `&app_env` so backend/worker/beat stay in lock-step.
  #
  # REMOVED in v2 (no longer referenced anywhere): OPENAI_API_KEY, REDDIT_*,
  # POSTPROXY_*, EDGE_TTS_*, GOOGLE_TTS_*, PEXELS_API_KEY, PIXABAY_API_KEY,
  # UNSPLASH_ACCESS_KEY.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file: .env
    environment: &app_env
      # App / URLs
      APP_ENV: ${APP_ENV}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      TIMEZONE: ${TIMEZONE}
      # Datastores
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      # LLM — Gemini ONLY, 3 env-configured tiers
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      GEMINI_MODEL_LITE: ${GEMINI_MODEL_LITE}
      GEMINI_MODEL_BALANCED: ${GEMINI_MODEL_BALANCED}
      GEMINI_MODEL_MAX: ${GEMINI_MODEL_MAX}
      # TTS — ElevenLabs ONLY
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_MODEL: ${ELEVENLABS_MODEL}
      ELEVENLABS_BASE_URL: ${ELEVENLABS_BASE_URL}
      # Images — Imagen 4 Fast
      IMAGE_PROVIDER: ${IMAGE_PROVIDER}
      IMAGEN_MODEL: ${IMAGEN_MODEL}
      # YouTube — direct OAuth, multi-account (no PostProxy)
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI}
      # Video processing
      FFMPEG_PATH: ${FFMPEG_PATH}
      FFPROBE_PATH: ${FFPROBE_PATH}
      WHISPER_MODEL: ${WHISPER_MODEL}
      VIDEO_RESOLUTION: ${VIDEO_RESOLUTION}
      # Storage (footage/music in assets, renders in media)
      MEDIA_DIR: ${MEDIA_DIR}
      ASSETS_DIR: ${ASSETS_DIR}
    command: >
      sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./assets:/app/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - viralflux

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worker
    restart: unless-stopped
    env_file: .env
    environment: *app_env
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./media:/app/media
      - ./assets:/app/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - viralflux

  # ── Celery BEAT scheduler ──────────────────────────────────────────────────
  # PRIMARY scheduler for the platform. Runs the DB-driven beat tasks defined in
  # app/workers/celery_app.py: `scan_schedules` (every 5 min → enqueues due
  # posts) and `sync_analytics` (daily). REQUIRED for posting automation — n8n
  # is only a thin supplementary automator (see n8n/README.md).
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beat
    restart: unless-stopped
    env_file: .env
    environment: *app_env
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./media:/app/media
      - ./assets:/app/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - viralflux

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - viralflux

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    env_file: .env
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: ${TIMEZONE}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - viralflux

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./media:/media:ro
    depends_on:
      - backend
      - frontend
      - n8n
    networks:
      - viralflux

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  viralflux:
    driver: bridge
