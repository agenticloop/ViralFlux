# ── Upstream definitions ──────────────────────────────────────────────────────

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

upstream n8n {
    server n8n:5678;
}

# ── Gzip ─────────────────────────────────────────────────────────────────────

gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   6;
gzip_buffers      16 8k;
gzip_http_version 1.1;
gzip_min_length   256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/x-font-ttf
    application/x-web-app-manifest+json
    font/opentype
    image/svg+xml
    image/x-icon;

# ── Main server block ─────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    client_max_body_size 500M;

    # ── /api/ → FastAPI backend ───────────────────────────────────────────────

    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    600s;

        # Buffer settings for large request/response bodies
        proxy_buffering            on;
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }

    # ── /n8n/ → n8n workflow automation (with WebSocket support) ─────────────

    location /n8n/ {
        proxy_pass         http://n8n;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    3600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    3600s;
    }

    # ── /media/ → static media files with caching ────────────────────────────

    location /media/ {
        alias /media/;

        expires            30d;
        add_header         Cache-Control "public, immutable";
        add_header         X-Content-Type-Options nosniff;

        # Security: prevent execution of scripts inside media directory
        location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
            deny all;
        }
    }

    # ── / → Next.js frontend (catch-all) ─────────────────────────────────────

    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;

        # Required for Next.js hot-reload WebSockets in development
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    60s;
    }
}
